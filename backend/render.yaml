# Render Blueprint for the VetConnect Ibafo API.
# Deploy: push to GitHub, then "New + > Blueprint" in the Render dashboard.
services:
  - type: web
    name: vetconnect-ibafo-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: PGSSL
        value: "true"
      - key: DATABASE_URL
        sync: false      # set from the Supabase connection string
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false      # set to the Vercel frontend URL
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: "VetConnect Ibafo <no-reply@vetconnect.ng>"
